apiVersion: v1
kind: Namespace
metadata:
  name: label-selector-lab

---
# ─────────────────────────────────────────────────────────
#  1. frontend-prod  (env=prod, tier=frontend, team=alpha)
# ─────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-prod
  namespace: label-selector-lab
  labels:
    env: prod
    tier: frontend
    team: alpha
spec:
  replicas: 2
  selector:
    matchLabels:
      app: label-selector-app
      env: prod
      tier: frontend
  template:
    metadata:
      labels:
        app: label-selector-app
        env: prod
        tier: frontend
        team: alpha
    spec:
      containers:
      - name: app
        image: label-selector-app:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080
        env:
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: LABEL_ENV
          value: "prod"
        - name: LABEL_TIER
          value: "frontend"
        - name: LABEL_TEAM
          value: "alpha"
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 3
          periodSeconds: 5

